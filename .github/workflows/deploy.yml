name: Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --include=optional

      - name: Ensure Linux native build binaries
        run: |
          LIGHTNINGCSS_VERSION=$(node -p "require('./node_modules/lightningcss/package.json').version")
          NEXT_VERSION=$(node -p "require('./node_modules/next/package.json').version")
          OXIDE_VERSION=$(node -p "require('./node_modules/@tailwindcss/oxide/package.json').version")
          npm install --no-save \
            "lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VERSION}" \
            "@next/swc-linux-x64-gnu@${NEXT_VERSION}" \
            "@next/swc-linux-x64-musl@${NEXT_VERSION}" \
            "@tailwindcss/oxide-linux-x64-gnu@${OXIDE_VERSION}" \
            "@tailwindcss/oxide-linux-x64-musl@${OXIDE_VERSION}"

      - name: Run ESLint
        run: npm run lint

      - name: Run security audit
        run: npm audit --audit-level=critical

      - name: Run tests
        run: npm run test --if-present

      - name: Build Next.js project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
